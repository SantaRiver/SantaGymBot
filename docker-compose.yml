services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-santa}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-santa_pass}
      POSTGRES_DB: ${POSTGRES_DB:-santagym}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-santa} -d ${POSTGRES_DB:-santagym}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal_network

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - internal_network

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-santa}:${POSTGRES_PASSWORD:-santa_pass}@db:5432/${POSTGRES_DB:-santagym}
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBAPP_BASE_URL: ${WEBAPP_BASE_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      ALLOW_TEST_AUTH: ${ALLOW_TEST_AUTH:-false}
      DEBUG: ${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - internal_network
      - proxy_network

  bot:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-santa}:${POSTGRES_PASSWORD:-santa_pass}@db:5432/${POSTGRES_DB:-santagym}
      REDIS_URL: redis://redis:6379/0
      BOT_TOKEN: ${BOT_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-supersecret}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBAPP_BASE_URL: ${WEBAPP_BASE_URL:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      ALLOW_TEST_AUTH: ${ALLOW_TEST_AUTH:-false}
      DEBUG: ${DEBUG:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      backend:
        condition: service_started
    command: ["python", "-m", "app.main_bot"]
    networks:
      - internal_network

  frontend:
    build:
      context: ./frontend
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - proxy_network

volumes:
  postgres_data:
  redis_data:
  letsencrypt:

networks:
  proxy_network:
    name: proxy_network
  internal_network:
