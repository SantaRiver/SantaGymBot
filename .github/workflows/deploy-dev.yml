name: Deploy Dev to VPS

on:
  workflow_run:
    workflows:
      - CI
    branches:
      - develop
    types:
      - completed

concurrency:
  group: deploy-development
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: development

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Copy files to server via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "backend,frontend,docker-compose.yml,docker-compose.server.yml,.env.dev.example"
          target: "/opt/santagym-dev"
          rm: false

      - name: Execute dev deployment via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/santagym-dev
            if [ ! -f .env.dev ]; then
              echo "Missing /opt/santagym-dev/.env.dev"
              exit 1
            fi

            docker compose -p santagym-dev --env-file .env.dev -f docker-compose.yml -f docker-compose.server.yml build backend bot frontend
            docker compose -p santagym-dev --env-file .env.dev -f docker-compose.yml -f docker-compose.server.yml up -d db redis
            docker compose -p santagym-dev --env-file .env.dev -f docker-compose.yml -f docker-compose.server.yml run --rm backend alembic upgrade head
            docker compose -p santagym-dev --env-file .env.dev -f docker-compose.yml -f docker-compose.server.yml up -d backend bot frontend

            timeout 120 sh -c 'until docker compose -p santagym-dev --env-file .env.dev -f docker-compose.yml -f docker-compose.server.yml exec -T backend python -c "import urllib.request; urllib.request.urlopen(\"http://127.0.0.1:8000/health\")"; do sleep 5; done'
            timeout 120 sh -c 'until docker compose -p santagym-dev --env-file .env.dev -f docker-compose.yml -f docker-compose.server.yml exec -T frontend wget --no-verbose --tries=1 --spider http://127.0.0.1/; do sleep 5; done'

            docker compose -p santagym-dev --env-file .env.dev -f docker-compose.yml -f docker-compose.server.yml ps
