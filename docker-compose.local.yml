services:
  db:
    ports:
      - "127.0.0.1:5432:5432"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.local
    command: ["uvicorn", "app.main_api:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      FRONTEND_URL: http://localhost:5173
      ALLOW_TEST_AUTH: ${ALLOW_TEST_AUTH:-true}
      DEBUG: "true"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.local
    command: ["npm", "run", "dev"]
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      CHOKIDAR_USEPOLLING: ${CHOKIDAR_USEPOLLING:-true}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://127.0.0.1:5173/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
